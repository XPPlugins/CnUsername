pluginManagement {
    repositories {
        mavenLocal()
        gradlePluginPortal()
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        maven {
            name = "NeoForgedCDN"
            url = "https://neoforged.forgecdn.net/releases"
        }
        maven {
            name = 'NeoForged'
            url = 'https://maven.neoforged.net/releases'
        }
        maven {
            name = 'NeoForged Snapshots'
            url = 'https://maven.neoforged.net/snapshots'
        }
        maven { url "https://maven.aliyun.com/repository/gradle-plugin" } // 阿里云镜像
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

rootProject.name = 'CnUsername'
include 'Core'
include 'BuildAllPlatforms'
include 'Fabric'
include 'Fabric:Fabric_18'
include 'Fabric:Fabric_19'
include 'Fabric:Fabric_20'
include 'Fabric:Fabric_21'
include 'Fabric:Fabric_26'  // 暂时禁用，需要独立构建
include 'Plugins'
include 'NeoForge'
include 'NeoForge:NeoForge_21'